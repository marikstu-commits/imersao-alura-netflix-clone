<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button class="btn-theme" onclick="toggleTheme()" aria-label="Alterar tema">
            🌓
        </button>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <nav class="profiles" aria-label="Seleção de perfis">
            <ul class="profiles_list">
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="perfil-1" aria-label="Selecionar Perfil 1">
                        <figure>
                            <img src="/assets/perfil-1.png" alt="Avatar do Perfil 1">
                            <figcaption>Amanda</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="catalogo/catalogo.html" class="perfil-2" aria-label="Selecionar Perfil 2">
                        <figure>
                            <img src="/assets/perfil-2.png" alt="Avatar do Perfil 2">
                            <figcaption>Bernardo</figcaption>
                        </figure>
                    </a>
                </li>
                <li class="profile">
                    <a href="catalogo/catalogo.html" class="perfil-3" aria-label="Selecionar Perfil 3">
                        <figure>
                            <img src="/assets/perfil-3.png" alt="Avatar do Perfil 3">
                            <figcaption>Caroline</figcaption>
                        </figure>
                    </a>
                </li>
               <li class="profile">
                    <a href="catalogo/catalogo.html" class="perfil-4" aria-label="Selecionar Perfil 4">
                        <figure>
                            <img src="/assets/Pizza-5~mv2.jpg" alt="Avatar do Perfil 4">
                            <figcaption>Daniel</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="manage-profiles">
            <a href="#" class="perfil-manage-btn">Gerenciar perfis</a>
        </div>
    </main>
    <script src="catalogo/js/index.js"></script>
</body>
</html>
